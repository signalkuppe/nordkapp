<div class="u-container u-pt-2 u-pt-2 conserve">
    <h2 class="u-titolosezione mb-0">{{t:'Conserve'}}</h2>
    <p class="u-mt-0 u-text-center u-mb-2">{{t: 'In vendita presso il nostro ristorante'}}</p>
    <ul class="u-list-reset">
        {{for conserve}}
        <li>
            <span>{{>prezzo}}€</span>
            <img src="{{>foto.small}}" alt="Ristorante Nordkapp {{t:nome}}">
            <p>{{t:nome}}</p>
        </li>
        {{/for}}
    </ul>
</div>
