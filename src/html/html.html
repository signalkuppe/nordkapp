<!DOCTYPE html>
<html lang="it" id="top">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="apple-touch-icon" sizes="180x180" href="/img/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicons/favicon-16x16.png">
    <link rel="manifest" href="/img/favicons/manifest.json">
    <link rel="mask-icon" href="/img/favicons/safari-pinned-tab.svg" color="#035487">
    <meta name="theme-color" content="#ffffff">
    <title>{{>title}}</title>
    <meta name="description" content="{{>description}}">
    {{if og}}
    <!-- og -->
    <meta property="og:locale" content="it_IT" />
    <meta property="og:site_name" content="Plurimedia" />
    <meta property="og:title" content="{{>og.title}}" />
    <meta property="og:url" content="{{>canonical}}" />
    <meta property="og:description" content="{{>canonical}}" />
    <meta property="og:image" content="https:{{>og.image}}" />
    <!--twitter-->
    <meta name="twitter:title" content="{{>og.title}}" />
    <meta name="twitter:url" content="{{>canonical}}" />
    <meta name="twitter:description" content="{{>og.description}}" />
    <meta name="twitter:image" content="https:{{>og.image}}" />
    <meta name="twitter:card" content="summary_large_image" />
    {{/if}}
    {{if canonical}}
    <link rel="canonical" href="{{>canonical}}"/>
    {{/if}} 
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700|Source+Sans+Pro:400,700" rel="stylesheet">
    <link rel="stylesheet" href="/css/normalize.css">
    <link rel="stylesheet" href="/css/animate.css">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/utilities.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/top.css">
    <link rel="stylesheet" href="/css/hero.css">
    <link rel="stylesheet" href="/css/nav.css">
    <link rel="stylesheet" href="/css/ristorante.css">
    <link rel="stylesheet" href="/css/menu.css">
    <link rel="stylesheet" href="/css/conserve.css">
    <link rel="stylesheet" href="/css/contatti.css">
  </head>
  <body>
    <script src="/js/lib/smoothscroll.js"></script>
    <script src="/js/lib/sticky.js"></script>
    <script src="/js/lib/gumshoe.js"></script>
    <script src="/js/lib/siema.js"></script>
    <script src="/js/lib/lozload.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
